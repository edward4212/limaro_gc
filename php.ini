; Directorio temporal para uploads de PHP
upload_tmp_dir = /tmp
sys_temp_dir   = /tmp

; TamaÃ±o mÃ¡ximo de subida
upload_max_filesize = 25M
post_max_size = 30M
max_file_uploads    = 5
allow_url_fopen = On
display_errors = On
enable_dl = On
file_uploads = On
max_execution_time = 30
max_input_time = 60
max_input_vars = 10000
memory_limit = 384M
session.gc_maxlifetime = 1440
session.save_path = "/home/limarocloud/limaro.limaro.cloud/storage/sessions"
zlib.output_compression = Off
